<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | ReturnPal</title>
    <link rel="icon" type="image/x-icon" href="assets/img/logo/favicon.png" />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/all-fontawesome.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
    <div class="preloader">
        <div class="loader-ripple"><div></div><div></div></div>
    </div>
    <main class="main">
        <div class="auth-area">
            <div class="container">
                <div class="col-md-5 mx-auto">
                    <div class="auth-form">
                        <div class="auth-header">
                            <img src="assets/img/logo/logo.png" alt="ReturnPal" />
                            <p>Choose a new password</p>
                        </div>
                        <div class="alert alert-success d-none" id="reset-success">Password updated. <a href="login.html">Log in</a> with your new password.</div>
                        <div class="alert alert-danger d-none" id="reset-error"></div>
                        <form id="reset-form">
                            <div class="form-group mb-3">
                                <div class="form-icon">
                                    <i class="far fa-lock"></i>
                                    <input type="password" class="form-control" id="reset-password" placeholder="New password (min 6 characters)" required minlength="6" autocomplete="new-password" />
                                </div>
                            </div>
                            <div class="form-group mb-3">
                                <div class="form-icon">
                                    <i class="far fa-lock"></i>
                                    <input type="password" class="form-control" id="reset-password-confirm" placeholder="Confirm new password" required minlength="6" autocomplete="new-password" />
                                </div>
                            </div>
                            <div class="auth-btn">
                                <button type="submit" class="theme-btn" id="reset-btn"><span class="far fa-check-circle"></span> Update password</button>
                            </div>
                        </form>
                        <div class="auth-bottom mt-4">
                            <p class="mb-0"><a href="login.html"><i class="far fa-arrow-left me-1"></i>Back to login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="assets/js/jquery-3.7.1.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
    $(document).ready(function() {
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token') || '';
        if (!token) {
            $('#reset-error').text('Missing reset link. Request a new one from the login page.').removeClass('d-none');
            $('#reset-form').addClass('d-none');
            return;
        }
        $('#reset-form').on('submit', async function(e) {
            e.preventDefault();
            var pw = $('#reset-password').val();
            var confirm = $('#reset-password-confirm').val();
            var $btn = $('#reset-btn');
            var $err = $('#reset-error');
            var $ok = $('#reset-success');
            $err.addClass('d-none');
            $ok.addClass('d-none');
            if (pw !== confirm) {
                $err.text('Passwords do not match.').removeClass('d-none');
                return;
            }
            $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span> Updating...');
            try {
                await API.request('/auth/reset-password', { method: 'POST', body: { token: token, password: pw } });
                $ok.removeClass('d-none');
                $('#reset-form').addClass('d-none');
            } catch (err) {
                $err.text((err && err.error) || 'Could not reset password. The link may have expired — request a new one.').removeClass('d-none');
            }
            $btn.prop('disabled', false).html('<span class="far fa-check-circle"></span> Update password');
        });
    });
    </script>
</body>
</html>
