<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live auction host — Northgate Auction House</title>
    <link rel="stylesheet" href="css/auction.css" />
</head>
<body class="auction-site">
    <header class="auction-topbar">
        <div class="auction-wrap auction-header-inner">
            <a class="auction-brand" href="index.html">
                <span class="brand-title">Northgate</span>
                <span class="brand-subtitle">Auction House</span>
            </a>
        </div>
    </header>

    <main class="auction-wrap auction-static" style="max-width: 900px">
        <h1>Live auction host</h1>
        <p class="ng-muted">Embed TikTok Live, YouTube, or Mux — placeholder below.</p>
        <div class="ng-video-wrap" style="margin-top: 1rem">
            <div class="ng-video-frame">
                <iframe
                    title="Host placeholder"
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                ></iframe>
            </div>
        </div>
        <p style="margin-top: 1rem"><a href="browse.html?mode=live">Browse live-mode lots →</a></p>
    </main>

    <footer class="auction-footer">
        <div class="auction-wrap auction-footer-bottom"><a href="index.html">Home</a></div>
    </footer>
</body>
</html>
