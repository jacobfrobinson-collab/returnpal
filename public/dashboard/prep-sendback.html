<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />

</head>
<body>
    <div class="wrapper">
        <header class=""><div class="topbar"><div class="container-fluid"><div class="navbar-header">
            <div class="d-flex align-items-center gap-2">
                <div class="topbar-item"><button type="button" class="button-toggle-menu topbar-button"><i class="ri-menu-2-line fs-24"></i></button></div>
            </div>
            <div class="d-flex align-items-center gap-1">
                <div class="topbar-item"><button type="button" class="topbar-button" id="light-dark-mode"><i class="ri-moon-line fs-24 light-mode"></i><i class="ri-sun-line fs-24 dark-mode"></i></button></div>
                <div class="dropdown topbar-item">
                    <a type="button" class="topbar-button" data-bs-toggle="dropdown"><img class="rounded-circle" width="32" src="assets/images/users/avatar-1.jpg" alt="" /></a>
                    <div class="dropdown-menu dropdown-menu-end">
                        <a class="dropdown-item" href="settings.html">Settings</a>
                        <a class="dropdown-item text-danger" href="login.html">Logout</a>
                    </div>
                </div>
            </div>
        </div></div></div></header>
        <div class="main-nav">
            <div class="logo-box"><a href="index.html"><img src="assets/images/logo-dark.png" class="logo-lg" alt="" /></a></div>
            <button type="button" class="button-sm-hover"><i class="ri-menu-2-line fs-24"></i></button>
            <div class="scrollbar" data-simplebar><ul class="navbar-nav" id="navbar-nav"></ul></div>
        </div>
        <div class="page-content">
            <div class="container-fluid">
                <div class="row mb-4">
                    <div class="col-12">
                        <h4 class="fw-semibold mb-1"><i class="ri-truck-line me-2"></i>Prep centre send-back</h4>
                        <p class="text-muted mb-0">Request eligible items to be shipped to your prep centre. Add your prep address in Settings before submitting.</p>
                    </div>
                </div>
                <div class="row g-4">
                    <div class="col-lg-5">
                        <div class="rp-card card border-0 mb-3">
                            <div class="card-header bg-white border-0"><h6 class="mb-0">Your prep address</h6></div>
                            <div class="card-body" id="prep-sendback-address">Loading…</div>
                        </div>
                        <div class="rp-card card border-0">
                            <div class="card-header bg-white border-0"><h6 class="mb-0">New request</h6></div>
                            <div class="card-body">
                                <form id="prep-sendback-form">
                                    <div class="mb-2"><label class="form-label small">Package reference</label><input type="text" class="form-control form-control-sm" id="prep-ref" required /></div>
                                    <div class="mb-2"><label class="form-label small">Item description</label><input type="text" class="form-control form-control-sm" id="prep-item" required /></div>
                                    <div class="mb-2"><label class="form-label small">Quantity</label><input type="number" class="form-control form-control-sm" id="prep-qty" value="1" min="1" /></div>
                                    <div class="mb-3"><label class="form-label small">Notes</label><textarea class="form-control form-control-sm" id="prep-notes" rows="2"></textarea></div>
                                    <button type="submit" class="btn btn-primary btn-sm">Submit request</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="rp-card card border-0">
                            <div class="card-header bg-white border-0"><h6 class="mb-0">Your requests</h6></div>
                            <div class="card-body" id="prep-sendback-list">Loading…</div>
                        </div>
                    </div>
                </div>
            </div>
            <footer class="footer rp-footer"><div class="container-fluid text-center"><script>document.write(new Date().getFullYear());</script> &copy; ReturnPal.</div></footer>
        </div>
