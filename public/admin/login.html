<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – ReturnPal</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bs-light, #f8f9fa); }
        .admin-login-card { max-width: 400px; width: 100%; }
        .admin-login-card .card-header { background: var(--bs-dark); color: #fff; font-weight: 600; }
    </style>
</head>
<body>
    <div class="admin-login-card card shadow">
        <div class="card-header px-4 py-3">ReturnPal Admin</div>
        <div class="card-body p-4">
            <p class="text-muted small mb-3">Sign in with an admin account to manage clients.</p>
            <div class="alert alert-danger d-none" id="auth-error"></div>
            <div class="alert alert-success d-none" id="auth-success"></div>
            <form id="admin-login-form">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="admin-email" placeholder="admin@example.com" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="admin-password" placeholder="Password" required />
                </div>
                <button type="submit" class="btn btn-dark w-100" id="admin-login-btn">Login</button>
            </form>
            <p class="mt-3 mb-0 small text-muted">
                <a href="/login.html">Client login</a>
            </p>
        </div>
    </div>

    <script src="/assets/js/jquery-3.7.1.min.js"></script>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js?v=rp9"></script>
    <script>
    $(function() {
        var origin = window.location.origin || '';
        if (API.isLoggedIn() && API.isCurrentUserAdmin()) {
            window.location.assign(origin + '/admin/index.html');
            return;
        }
        if (API.isLoggedIn() && !API.isCurrentUserAdmin()) {
            API.clearToken();
        }

        var $error = $('#auth-error');
        var $success = $('#auth-success');
        function showError(msg) { $error.text(msg).removeClass('d-none'); $success.addClass('d-none'); }
        function showSuccess(msg) { $success.text(msg).removeClass('d-none'); $error.addClass('d-none'); }

        $('#admin-login-form').on('submit', async function(e) {
            e.preventDefault();
            $error.addClass('d-none');
            $success.addClass('d-none');
            var btn = $('#admin-login-btn');
            btn.prop('disabled', true).text('Signing in...');

            try {
                await API.login($('#admin-email').val().trim(), $('#admin-password').val());
                try {
                    var me = await API.getProfile({ skipAuthRedirect: true });
                    if (me && me.user) API.setUser(me.user);
                } catch (e2) { /* keep login payload */ }
                if (API.isCurrentUserAdmin()) {
                    showSuccess('Redirecting...');
                    window.location.assign(origin + '/admin/index.html');
                } else {
                    API.clearToken();
                    showError('Not an admin account. On the server run: node set-admin.js your@email.com then sign in again (or use npm run create-admin for a new admin).');
                    btn.prop('disabled', false).text('Login');
                }
            } catch (err) {
                showError(err.error || 'Login failed.');
                btn.prop('disabled', false).text('Login');
            }
        });
    });
    </script>
</body>
</html>
