<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Audit log – ReturnPal</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>
        body { background: var(--bs-light, #f8f9fa); }
        .admin-header { background: var(--bs-dark); color: #fff; }
        .admin-header a { color: rgba(255,255,255,.9); text-decoration: none; }
    </style>
</head>
<body>
    <header class="admin-header py-3 mb-4">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <h1 class="h5 mb-0"><a href="/admin/index.html" class="text-white text-decoration-none">← Clients</a> · Audit log</h1>
            <a href="/admin/index.html" class="small text-white-50">Back</a>
        </div>
    </header>
    <div class="container-fluid">
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-sm mb-0">
                    <thead><tr><th>When</th><th>Admin</th><th>Action</th><th>Detail</th></tr></thead>
                    <tbody id="audit-tbody"><tr><td colspan="4" class="text-muted p-4">Loading…</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="/assets/js/jquery-3.7.1.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script>
    $(function() {
        if (!API.isLoggedIn() || !API.isCurrentUserAdmin()) {
            window.location.href = '/admin/login.html';
            return;
        }
        function esc(s) {
            return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
        API.adminAuditLog({ limit: 100 }).then(function(data) {
            var rows = data.entries || [];
            var $tb = $('#audit-tbody').empty();
            rows.forEach(function(r) {
                $tb.append('<tr><td class="small">' + esc(r.created_at) + '</td><td class="small">' + esc(r.admin_email || r.admin_user_id) + '</td><td>' + esc(r.action) + '</td><td class="small"><pre class="mb-0" style="white-space:pre-wrap;max-width:520px">' + esc(r.detail) + '</pre></td></tr>');
            });
            if (!rows.length) $tb.append('<tr><td colspan="4" class="text-muted p-4">No entries yet.</td></tr>');
        }).catch(function() {
            $('#audit-tbody').html('<tr><td colspan="4" class="text-danger p-4">Failed to load</td></tr>');
        });
    });
    </script>
</body>
</html>
