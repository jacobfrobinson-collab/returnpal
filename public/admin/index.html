<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Clients – ReturnPal</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>
        body { background: var(--bs-light, #f8f9fa); }
        .admin-header { background: var(--bs-dark); color: #fff; }
        .admin-header a { color: rgba(255,255,255,.9); text-decoration: none; }
        .admin-header a:hover { color: #fff; }
    </style>
</head>
<body>
    <header class="admin-header py-3 mb-4">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="h5 mb-0">ReturnPal Admin – Clients</h1>
                <div class="d-flex align-items-center gap-3">
                    <span class="small opacity-75" id="admin-user-email"></span>
                    <a href="/admin/insights.html" class="small">Client insights</a>
                    <a href="/admin/queries.html" class="small">Open queries</a>
                    <a href="/admin/index.html" class="small">Refresh</a>
                    <a href="/login.html" class="small" id="admin-logout">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container-fluid">
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h2 class="h6 mb-0">All clients</h2>
            </div>
            <div class="card-body p-0">
                <div id="admin-loading" class="p-5 text-center text-muted">
                    <span class="spinner-border spinner-border-sm me-2"></span>Loading clients…
                </div>
                <div id="admin-error" class="p-5 text-center text-danger d-none"></div>
                <div class="table-responsive d-none" id="admin-table-wrap">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Legacy ID</th>
                                <th>Company</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/jquery-3.7.1.min.js"></script>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js?v=rp10"></script>
    <script src="/assets/js/dateUk.js"></script>
    <script>
    $(function() {
        var ao = window.location.origin || '';
        if (!API.isLoggedIn()) {
            window.location.assign(ao + '/admin/login.html');
            return;
        }
        if (!API.isCurrentUserAdmin()) {
            API.clearToken();
            window.location.assign(ao + '/admin/login.html');
            return;
        }
        var user = API.getUser();
        $('#admin-user-email').text((user && user.email) || '');

        $('#admin-logout').on('click', function(e) {
            e.preventDefault();
            API.clearToken();
            window.location.assign(ao + '/admin/login.html');
        });

        function showLoading() {
            $('#admin-loading').removeClass('d-none');
            $('#admin-error').addClass('d-none');
            $('#admin-table-wrap').addClass('d-none');
        }
        function showError(msg) {
            $('#admin-loading').addClass('d-none');
            $('#admin-error').text(msg).removeClass('d-none');
            $('#admin-table-wrap').addClass('d-none');
        }
        function showTable(users) {
            $('#admin-loading').addClass('d-none');
            $('#admin-error').addClass('d-none');
            var $tbody = $('#admin-users-tbody');
            $tbody.empty();
            if (!users || users.length === 0) {
                $tbody.html('<tr><td colspan="7" class="text-center py-4 text-muted">No clients yet.</td></tr>');
            } else {
                users.forEach(function(u) {
                    var date = u.created_at ? RP_DATE.format(u.created_at) : '-';
                    var idPadded = u.id != null ? String(u.id).padStart(4, '0') : '';
                    var isAdmin = u.is_admin === true || u.is_admin === 1 || u.is_admin === '1';
                    var emailAttr = String(u.email || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
                    var deleteBtn = isAdmin
                        ? '<span class="text-muted small me-1" title="Admin accounts cannot be deleted here">—</span>'
                        : '<button type="button" class="btn btn-sm btn-outline-danger delete-user-btn me-1" data-id="' + u.id + '" data-email="' + emailAttr + '">Delete</button>';
                    var legRaw = (u.legacy_client_id && String(u.legacy_client_id).trim()) ? String(u.legacy_client_id).trim() : '';
                    var legCell = legRaw
                        ? '<span class="font-monospace">' + legRaw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;') + '</span>'
                        : '—';
                    var row = '<tr>' +
                        '<td>' + idPadded + '</td>' +
                        '<td>' + (u.full_name || '-') + (isAdmin ? ' <span class="badge bg-secondary">Admin</span>' : '') + '</td>' +
                        '<td>' + (u.email || '') + '</td>' +
                        '<td>' + legCell + '</td>' +
                        '<td>' + (u.company_name || '-') + '</td>' +
                        '<td>' + date + '</td>' +
                        '<td class="text-nowrap">' +
                        deleteBtn +
                        '<a href="client.html?id=' + u.id + '" class="btn btn-sm btn-outline-secondary me-1">Update data</a>' +
                        '<button type="button" class="btn btn-sm btn-outline-primary view-dashboard-btn" data-id="' + u.id + '" data-name="' + (u.full_name || u.email) + '">View dashboard</button>' +
                        '</td>' +
                        '</tr>';
                    $tbody.append(row);
                });
            }
            $('#admin-table-wrap').removeClass('d-none');
        }

        function loadUsers() {
            showLoading();
            API.request('/admin/users')
                .then(function(data) {
                    showTable(data.users || []);
                })
                .catch(function(err) {
                    if (err && err.status === 403) {
                        API.clearToken();
                        window.location.assign(ao + '/admin/login.html');
                        return;
                    }
                    showError(err && err.error ? err.error : 'Failed to load clients.');
                });
        }

        $(document).on('click', '.delete-user-btn', function() {
            var btn = $(this);
            var id = btn.data('id');
            var email = btn.data('email') || '';
            if (!confirm('Permanently delete this account?\n\n' + email + '\n\nAll packages, inventory, and history for this client will be removed. This cannot be undone.')) {
                return;
            }
            btn.prop('disabled', true).text('Deleting…');
            API.adminDeleteUser(id)
                .then(function() {
                    loadUsers();
                })
                .catch(function(err) {
                    alert(err && err.error ? err.error : 'Delete failed.');
                    btn.prop('disabled', false).text('Delete');
                });
        });

        $(document).on('click', '.view-dashboard-btn', function() {
            var id = $(this).data('id');
            var name = $(this).data('name');
            var btn = $(this);
            btn.prop('disabled', true).text('Opening…');

            API.request('/admin/impersonate/' + id, { method: 'POST' })
                .then(function(data) {
                    if (!data.token) {
                        showError('Could not open dashboard.');
                        btn.prop('disabled', false).text('View dashboard');
                        return;
                    }
                    var url = '/dashboard/index.html?impersonate=' + encodeURIComponent(data.token);
                    window.open(url, '_blank', 'noopener');
                    btn.prop('disabled', false).text('View dashboard');
                })
                .catch(function(err) {
                    alert(err && err.error ? err.error : 'Failed to open dashboard.');
                    btn.prop('disabled', false).text('View dashboard');
                });
        });

        loadUsers();
    });
    </script>
</body>
</html>
