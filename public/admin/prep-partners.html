<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Prep partners – ReturnPal</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
    <style>
        body { background: #f8f9fa; }
        .admin-header { background: #212529; color: #fff; }
        .admin-header a { color: rgba(255, 255, 255, 0.9); text-decoration: none; }
    </style>
</head>
<body>
    <header class="admin-header py-3 mb-4">
        <div class="container-fluid d-flex justify-content-between flex-wrap gap-2">
            <h1 class="h5 mb-0">Prep network partners</h1>
            <div class="d-flex gap-3 align-items-center flex-wrap">
                <a href="/admin/index.html" class="small">Clients</a>
                <a href="/admin/prep-sendback.html" class="small">Prep send-back</a>
                <a href="/login.html" class="small" id="logout">Logout</a>
            </div>
        </div>
    </header>
    <div class="container-fluid">
        <p class="text-muted small">Listed on client <strong>Prep network</strong> dashboard page.</p>
        <form id="add-form" class="card mb-4 p-3">
            <h2 class="h6">Add partner</h2>
            <div class="row g-2">
                <div class="col-md-3"><input class="form-control form-control-sm" id="name" placeholder="Name" required /></div>
                <div class="col-md-2"><input class="form-control form-control-sm" id="region" placeholder="Region" /></div>
                <div class="col-md-4"><input class="form-control form-control-sm" id="services" placeholder="Services" /></div>
                <div class="col-md-2"><input class="form-control form-control-sm" id="sort_order" type="number" placeholder="Sort" value="0" /></div>
                <div class="col-md-1"><button type="submit" class="btn btn-primary btn-sm w-100">Add</button></div>
            </div>
        </form>
        <div id="list" class="text-muted">Loading…</div>
    </div>
    <script src="/assets/js/api.js"></script>
    <script>
        const token = localStorage.getItem('returnpal_token');
        async function api(path, opts) {
            const res = await fetch('/api/admin' + path, {
                ...opts,
                headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json', ...(opts && opts.headers) },
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw data;
            return data;
        }
        async function load() {
            const data = await api('/prep-partners');
            const el = document.getElementById('list');
            if (!data.partners || !data.partners.length) {
                el.textContent = 'No partners yet.';
                return;
            }
            el.innerHTML =
                '<table class="table table-sm bg-white"><thead><tr><th>Name</th><th>Region</th><th>Active</th><th></th></tr></thead><tbody>' +
                data.partners
                    .map(
                        (p) =>
                            '<tr><td>' +
                            p.name +
                            '</td><td>' +
                            (p.region || '') +
                            '</td><td>' +
                            (p.active ? 'Yes' : 'No') +
                            '</td><td><button class="btn btn-sm btn-outline-secondary" data-id="' +
                            p.id +
                            '" data-toggle-active>' +
                            (p.active ? 'Deactivate' : 'Activate') +
                            '</button></td></tr>'
                    )
                    .join('') +
                '</tbody></table>';
            el.querySelectorAll('[data-toggle-active]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const row = data.partners.find((x) => String(x.id) === id);
                    await api('/prep-partners/' + id, { method: 'PATCH', body: JSON.stringify({ active: !row.active }) });
                    load();
                });
            });
        }
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await api('/prep-partners', {
                method: 'POST',
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    region: document.getElementById('region').value,
                    services: document.getElementById('services').value,
                    sort_order: document.getElementById('sort_order').value,
                }),
            });
            e.target.reset();
            load();
        });
        document.getElementById('logout').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('returnpal_token');
            location.href = '/login.html';
        });
        load().catch((err) => {
            document.getElementById('list').textContent = (err && err.error) || 'Failed to load';
        });
    </script>
</body>
</html>
