<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | ReturnPal</title>
    <link rel="icon" type="image/x-icon" href="assets/img/logo/favicon.png" />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/all-fontawesome.min.css" />
    <link rel="stylesheet" href="assets/css/animate.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
    <div class="preloader">
        <div class="loader-ripple"><div></div><div></div></div>
    </div>
    <main class="main">
        <div class="auth-area">
            <div class="container">
                <div class="col-md-5 mx-auto">
                    <div class="auth-form">
                        <div class="auth-header">
                            <img src="assets/img/logo/logo.png" alt="ReturnPal" />
                            <p>Reset your password</p>
                        </div>
                        <div class="alert alert-success d-none" id="forgot-success">If an account exists for that email, we’ve sent a reset link. Check your inbox and spam folder.</div>
                        <div class="alert alert-danger d-none" id="forgot-error"></div>
                        <form id="forgot-form">
                            <div class="form-group">
                                <div class="form-icon">
                                    <i class="far fa-envelope"></i>
                                    <input type="email" class="form-control" id="forgot-email" placeholder="Your email address" required />
                                </div>
                            </div>
                            <div class="auth-btn">
                                <button type="submit" class="theme-btn" id="forgot-btn"><span class="far fa-paper-plane"></span> Send reset link</button>
                            </div>
                        </form>
                        <div class="auth-bottom mt-4">
                            <p class="mb-0"><a href="login.html"><i class="far fa-arrow-left me-1"></i>Back to login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="assets/js/jquery-3.7.1.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
    $(document).ready(function() {
        $('#forgot-form').on('submit', async function(e) {
            e.preventDefault();
            var $btn = $('#forgot-btn');
            var $err = $('#forgot-error');
            var $ok = $('#forgot-success');
            $err.addClass('d-none');
            $ok.addClass('d-none');
            $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span> Sending...');
            try {
                await API.request('/auth/forgot-password', { method: 'POST', body: { email: $('#forgot-email').val().trim() } });
                $ok.removeClass('d-none');
                $('#forgot-form')[0].reset();
            } catch (err) {
                if (err.status === 404 || err.status === 501) {
                    $ok.removeClass('d-none');
                    $('#forgot-form')[0].reset();
                } else {
                    $err.text(err.error || 'Something went wrong. Try again or contact support.').removeClass('d-none');
                }
            }
            $btn.prop('disabled', false).html('<span class="far fa-paper-plane"></span> Send reset link');
        });
    });
    </script>
</body>
</html>
