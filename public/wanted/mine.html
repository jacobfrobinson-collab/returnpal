<!doctype html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My wanted posts | ReturnPal</title>
    <link rel="icon" type="image/x-icon" href="../assets/img/logo/favicon.png" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/all-fontawesome.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
    <header class="header">
        <div class="main-navigation">
            <nav class="navbar navbar-expand-lg">
                <div class="container">
                    <a class="navbar-brand" href="../index.html">
                        <span class="navbar-brand-icon"><img src="../assets/img/logo/logo-icon.png" alt="" /></span>
                        <span class="navbar-brand-text">ReturnPal</span>
                    </a>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Browse</a></li>
                        <li class="nav-item"><a class="nav-link" href="post.html">Post a want</a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>

    <main class="main py-4">
        <div class="container py-3 col-lg-9">
            <h1 class="h3 mb-4">My wanted posts</h1>
            <div id="need-login" class="alert alert-warning d-none">Please <a href="../login.html">log in</a> to see your posts.</div>
            <div id="alert-err" class="alert alert-danger d-none"></div>
            <div id="empty" class="text-muted d-none">You haven’t posted anything yet. <a href="post.html">Create a wanted post</a>.</div>
            <ul class="list-group list-group-flush shadow-sm rounded border" id="list"></ul>
        </div>
    </main>

    <script src="../assets/js/api.js"></script>
    <script>
        (function () {
            if (!API.isLoggedIn()) {
                document.getElementById('need-login').classList.remove('d-none');
                return;
            }
            function esc(s) {
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }
            API.request('/wanted/mine', { method: 'GET' }).then(function (data) {
                var rows = (data && data.listings) || [];
                var list = document.getElementById('list');
                var empty = document.getElementById('empty');
                if (!rows.length) {
                    empty.classList.remove('d-none');
                    return;
                }
                list.innerHTML = rows.map(function (L) {
                    var rc = L.response_count != null ? L.response_count : 0;
                    return (
                        '<li class="list-group-item d-flex justify-content-between align-items-start flex-wrap gap-2">' +
                        '<div><a href="detail.html?id=' + encodeURIComponent(L.id) + '" class="fw-semibold text-decoration-none">' + esc(L.title) + '</a>' +
                        '<p class="mb-0 small text-muted">' + rc + ' offer' + (rc === 1 ? '' : 's') + ' · ' + esc(L.status) + '</p></div>' +
                        '<a class="btn btn-sm btn-outline-primary" href="detail.html?id=' + encodeURIComponent(L.id) + '">View</a></li>'
                    );
                }).join('');
            }).catch(function (e) {
                document.getElementById('alert-err').textContent = (e && e.error) || 'Could not load.';
                document.getElementById('alert-err').classList.remove('d-none');
            });
        })();
    </script>
</body>
</html>
