<!doctype html>
<html lang="en">

<head>
    <!-- meta tags -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <!-- title -->
    <title>Login - ReturnPal</title>
    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="assets/img/logo/favicon.png" />
    <!-- css -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/all-fontawesome.min.css" />
    <link rel="stylesheet" href="assets/css/animate.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script>
        (function() {
            document.documentElement.setAttribute('data-bs-theme', 'light');
        })();
    </script>
</head>

<body>
    <!-- preloader -->
    <div class="preloader">
        <div class="loader-ripple">
            <div></div>
            <div></div>
        </div>
    </div>
    <!-- preloader end -->

    <main class="main">
        <!-- login area -->
        <div class="auth-area">
            <div class="container">
                <div class="col-md-5 mx-auto">
                    <div class="auth-form">
                        <div class="auth-header">
                            <img src="assets/img/logo/logo.png" alt="" />
                            <p>Login your ReturnPal account</p>
                        </div>
                        <div class="alert alert-danger d-none" id="auth-error"></div>
                        <div class="alert alert-success d-none" id="auth-success"></div>

                        <!-- Login Form -->
                        <form id="login-form">
                            <div class="form-group">
                                <div class="form-icon">
                                    <i class="far fa-envelope"></i>
                                    <input type="email" class="form-control" id="login-email" placeholder="Your Email" required />
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-icon">
                                    <i class="far fa-key"></i>
                                    <input type="password" id="login-password" class="form-control" placeholder="Your Password" required />
                                    <span class="password-view"><i class="far fa-eye-slash"></i></span>
                                </div>
                            </div>
                            <div class="auth-group">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="remember" />
                                    <label class="form-check-label" for="remember"> Remember Me </label>
                                </div>
                                <a href="forgot-password.html" class="auth-group-link">Forgot Password?</a>
                            </div>
                            <div class="auth-btn">
                                <button type="submit" class="theme-btn" id="login-btn"><span class="far fa-sign-in"></span> Login</button>
                            </div>
                        </form>

                        <!-- Register Form (hidden by default) -->
                        <form id="register-form" class="d-none" autocomplete="on">
                            <div class="rp-honeypot" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none">
                                <label for="reg-website">Website</label>
                                <input type="text" id="reg-website" name="website" tabindex="-1" autocomplete="off" />
                            </div>
                            <input type="hidden" id="reg-form-started" name="form_started_at" value="" />
                            <div class="form-group">
                                <div class="form-icon">
                                    <i class="far fa-user-tie"></i>
                                    <input type="text" class="form-control" id="reg-name" placeholder="Full Name" required />
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-icon">
                                    <i class="far fa-building"></i>
                                    <input type="text" class="form-control" id="reg-company" placeholder="Company Name (optional)" />
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-icon">
                                    <i class="far fa-envelope"></i>
                                    <input type="email" class="form-control" id="reg-email" placeholder="Your Email" required />
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-icon">
                                    <i class="far fa-key"></i>
                                    <input type="password" class="form-control" id="reg-password" placeholder="Password (min 6 chars)" required minlength="6" />
                                </div>
                            </div>
                            <div id="turnstile-register-wrap" class="mb-3 d-none d-flex justify-content-center"></div>
                            <div class="border rounded p-3 mb-3 text-start" style="background:#f7f9fc;border-color:#e3e8f0!important">
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" value="1" id="reg-accept-terms" required />
                                    <label class="form-check-label small" for="reg-accept-terms">
                                        I have read and agree to the
                                        <a href="terms.html" target="_blank" rel="noopener">Returns Recovery Terms of Service</a>
                                        and the
                                        <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>
                                        <span id="reg-terms-version-label">(Version 1.0, effective 24 June 2026)</span>.
                                    </label>
                                </div>
                                <div class="form-check mb-0">
                                    <input class="form-check-input" type="checkbox" value="1" id="reg-accept-pricing" required />
                                    <label class="form-check-label small" for="reg-accept-pricing">
                                        I understand that ReturnPal's commission (15&ndash;25%) is taken from the <b>net amount</b> &mdash; i.e. after the marketplace's own selling costs for each item (selling fees, shipping, per-item promoted-listing fees) have been deducted &mdash; and that the amount I receive is therefore lower than the gross sale price.
                                    </label>
                                </div>
                            </div>
                            <div class="auth-btn">
                                <button type="submit" class="theme-btn" id="register-btn"><span class="far fa-user-plus"></span> Create Account</button>
                            </div>
                        </form>

                        <div class="auth-bottom">
                            <p class="auth-bottom-text" id="auth-toggle-text">Don't have an account? <a href="#" id="show-register">Register.</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- login area end -->
    </main>

    <!-- js -->
    <script src="assets/js/jquery-3.7.1.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/wow.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
    $(document).ready(function() {
        // Redirect if already logged in (admins → admin panel, clients → dashboard)
        if (API.isLoggedIn()) {
            const o = window.location.origin || '';
            window.location.assign(API.isCurrentUserAdmin() ? o + '/admin/index.html' : o + '/dashboard/index.html');
            return;
        }

        // Referral: ?ref=RP123 (from /register.html redirect or shared link)
        var urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('ref')) {
            try { sessionStorage.setItem('returnpal_pending_ref', urlParams.get('ref').trim()); } catch (e) {}
        }
        function getReferralCodeForRegister() {
            var fromStorage = '';
            try { fromStorage = sessionStorage.getItem('returnpal_pending_ref') || ''; } catch (e) {}
            var fromUrl = urlParams.get('ref') || '';
            return (fromUrl || fromStorage || '').trim();
        }

        // Open register when #register or ?openRegister=1 (redirect from /register.html)
        if (window.location.hash === '#register' || urlParams.get('openRegister') === '1') {
            $('#login-form').addClass('d-none');
            $('#register-form').removeClass('d-none');
            $('#auth-toggle-text').html('Already have an account? <a href="#" id="show-login">Login.</a>');
            $('.auth-header p').text('Create your ReturnPal account');
            showRegisterPanel();
        }

        const $error = $('#auth-error');
        const $success = $('#auth-success');
        var registerConfig = { turnstile_site_key: null, turnstile_required: false, min_form_seconds: 3 };
        var turnstileWidgetId = null;

        function stampRegisterFormStarted() {
            $('#reg-form-started').val(String(Date.now()));
        }

        function loadTurnstileScript() {
            return new Promise(function(resolve, reject) {
                if (window.turnstile) return resolve();
                var s = document.createElement('script');
                s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
                s.async = true;
                s.defer = true;
                s.onload = function() { resolve(); };
                s.onerror = function() { reject(new Error('Could not load security check')); };
                document.head.appendChild(s);
            });
        }

        function renderTurnstileIfNeeded() {
            var $wrap = $('#turnstile-register-wrap');
            if (!registerConfig.turnstile_site_key) {
                $wrap.addClass('d-none').empty();
                return Promise.resolve();
            }
            return loadTurnstileScript().then(function() {
                $wrap.removeClass('d-none').empty();
                if (turnstileWidgetId != null && window.turnstile) {
                    try { window.turnstile.remove(turnstileWidgetId); } catch (e) {}
                    turnstileWidgetId = null;
                }
                turnstileWidgetId = window.turnstile.render($wrap[0], {
                    sitekey: registerConfig.turnstile_site_key,
                    theme: 'light',
                });
            });
        }

        API.getRegisterConfig().then(function(cfg) {
            registerConfig = cfg || registerConfig;
            if (cfg && cfg.terms_effective) {
                var parts = String(cfg.terms_effective).split('-');
                if (parts.length === 3) {
                    var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                    $('#reg-terms-version-label').text(
                        '(Version ' + (cfg.terms_version || '1.0') + ', effective ' +
                        parseInt(parts[2], 10) + ' ' + months[parseInt(parts[1], 10) - 1] + ' ' + parts[0] + ')'
                    );
                }
            }
        }).catch(function() {});

        function showRegisterPanel() {
            stampRegisterFormStarted();
            renderTurnstileIfNeeded().catch(function() {});
        }

        function showError(msg) {
            $error.text(msg).removeClass('d-none');
            $success.addClass('d-none');
        }
        function showSuccess(msg) {
            $success.text(msg).removeClass('d-none');
            $error.addClass('d-none');
        }
        function clearAlerts() {
            $error.addClass('d-none');
            $success.addClass('d-none');
        }

        // Toggle between login and register
        $('#show-register').on('click', function(e) {
            e.preventDefault();
            clearAlerts();
            $('#login-form').addClass('d-none');
            $('#register-form').removeClass('d-none');
            $('#auth-toggle-text').html('Already have an account? <a href="#" id="show-login">Login.</a>');
            $('.auth-header p').text('Create your ReturnPal account');
            showRegisterPanel();
        });

        $(document).on('click', '#show-login', function(e) {
            e.preventDefault();
            clearAlerts();
            $('#register-form').addClass('d-none');
            $('#login-form').removeClass('d-none');
            $('#auth-toggle-text').html('Don\'t have an account? <a href="#" id="show-register">Register.</a>');
            $('.auth-header p').text('Login your ReturnPal account');
        });

        // Login
        $('#login-form').on('submit', async function(e) {
            e.preventDefault();
            clearAlerts();
            const btn = $('#login-btn');
            btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span> Logging in...');

            try {
                const email = $('#login-email').val().trim();
                const password = $('#login-password').val();
                await API.login(email, password);
                try {
                    const me = await API.getProfile({ skipAuthRedirect: true });
                    if (me && me.user) API.setUser(me.user);
                } catch (e) { /* non-fatal — do not clear token; /auth/me can fail transiently */ }
                showSuccess('Login successful! Redirecting...');
                const dash = (window.location.origin || '') + '/dashboard/index.html';
                setTimeout(() => { window.location.assign(dash); }, 500);
            } catch (err) {
                if (err && err.approval_pending) {
                    showError(err.error || 'Your account is waiting for approval.');
                } else {
                    showError(err.error || 'Login failed. Please check your credentials.');
                }
                btn.prop('disabled', false).html('<span class="far fa-sign-in"></span> Login');
            }
        });

        // Register
        $('#register-form').on('submit', async function(e) {
            e.preventDefault();
            clearAlerts();
            const btn = $('#register-btn');
            btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span> Creating account...');

            try {
                const full_name = $('#reg-name').val().trim();
                const company_name = $('#reg-company').val().trim();
                const email = $('#reg-email').val().trim();
                const password = $('#reg-password').val();
                if (!$('#reg-accept-terms').is(':checked')) {
                    showError('You must accept the Terms of Service and Privacy Policy to create an account.');
                    btn.prop('disabled', false).html('<span class="far fa-user-plus"></span> Create Account');
                    return;
                }
                if (!$('#reg-accept-pricing').is(':checked')) {
                    showError('You must confirm you understand how ReturnPal pricing works before creating an account.');
                    btn.prop('disabled', false).html('<span class="far fa-user-plus"></span> Create Account');
                    return;
                }
                var extras = {
                    website: $('#reg-website').val(),
                    form_started_at: $('#reg-form-started').val(),
                    accept_terms: true,
                    accept_pricing_ack: true,
                };
                if (registerConfig.turnstile_site_key && window.turnstile && turnstileWidgetId != null) {
                    var tok = window.turnstile.getResponse(turnstileWidgetId);
                    if (!tok && registerConfig.turnstile_required) {
                        showError('Please complete the security check.');
                        btn.prop('disabled', false).html('<span class="far fa-user-plus"></span> Create Account');
                        return;
                    }
                    if (tok) extras.turnstile_token = tok;
                }
                const reg = await API.register(email, password, full_name, company_name, getReferralCodeForRegister(), extras);
                try { sessionStorage.removeItem('returnpal_pending_ref'); } catch (e) {}
                if (reg && (reg.approval_required || reg.approval_pending)) {
                    showSuccess(reg.message || 'Registration received. You can log in after ReturnPal approves your account.');
                    btn.prop('disabled', false).html('<span class="far fa-user-plus"></span> Create Account');
                    return;
                }
                try {
                    const me = await API.getProfile({ skipAuthRedirect: true });
                    if (me && me.user) API.setUser(me.user);
                } catch (e) { /* non-fatal */ }
                showSuccess('Account created! Redirecting...');
                const dashReg = (window.location.origin || '') + '/dashboard/index.html';
                setTimeout(() => { window.location.assign(dashReg); }, 500);
            } catch (err) {
                const msg = err.errors ? err.errors.map(e => e.msg).join(', ') : (err.error || 'Registration failed.');
                showError(msg);
                btn.prop('disabled', false).html('<span class="far fa-user-plus"></span> Create Account');
            }
        });
    });
    </script>
</body>

</html>
